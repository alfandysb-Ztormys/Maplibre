<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS MAPID - Maplibre Task 3 & 4</title>
    <!-- Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <!-- Turf.js -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap");
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      #map {
        height: calc(100vh);
      }
      .glass {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-slate-50 overflow-hidden text-slate-900 leading-tight">
    <nav
      class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-8 z-30 relative"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-100 transform -rotate-2"
        >
          M
        </div>
        <div>
          <h1 class="text-lg font-extrabold tracking-tight">
            Webgis <span class="text-indigo-600">Mapid</span>
          </h1>
          <p
            class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5"
          >
            Maplibre Task 3 & 4 - Alfandy R.S.
          </p>
        </div>
      </div>
    </nav>

    <div class="flex h-screen pt-0">
      <aside
        class="w-[350px] bg-white border-r border-slate-100 overflow-y-auto p-6 flex-shrink-0 z-20 scrollbar-hide"
      >
        <div class="space-y-10 pb-20">

          <!-- Basemap -->
          <section>
            <h3
              class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4"
            >
              1. Basemap Style
            </h3>
            <div class="flex flex-col gap-2">
              <button
                id="btn-street"
                onclick="updateStyleToStreet()"
                class="text-left px-5 py-3 rounded-2xl border-2 border-slate-50 bg-slate-50 text-slate-500 text-[11px] font-black hover:bg-slate-100 transition-all"
              >
                MAPID Street
              </button>
              <button
                id="btn-dark"
                onclick="updateStyleToDark()"
                class="text-left px-5 py-3 rounded-2xl border-2 border-slate-50 bg-slate-50 text-slate-500 text-[11px] font-black hover:bg-slate-100 transition-all"
              >
                MAPID Dark
              </button>
              <button
                id="btn-satellite"
                onclick="updateStyleToSatellite()"
                class="text-left px-5 py-3 rounded-2xl border-2 border-slate-50 bg-slate-50 text-slate-500 text-[11px] font-black hover:bg-slate-100 transition-all"
              >
                MAPID Satellite
              </button>
            </div>
          </section>

          <!-- 2. POINT STYLING - Rumah Sakit -->
          <section>
            <h3
              class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4"
            >
              2. Point Styling
            </h3>
            <div class="bg-slate-50 rounded-3xl p-5 space-y-4">
              <div class="flex flex-col items-center justify-between gap-4">
                <div class="flex flex-row w-full items-center justify-between gap-4">
                  <div class="flex gap-2">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <span class="text-[11px] font-black text-slate-700 uppercase">Rumah Sakit</span>
                  </div>
                  <button
                    id="toggle-point-layer"
                    onclick="toggleLayerRumahSakit()"
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm border border-slate-200 text-indigo-600 hover:bg-slate-100 transition-colors"
                  >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                  </button>
                </div>

                <!-- STYLING COLOR -->
                <div class="flex w-full items-center justify-between gap-4">
                  <label>Color</label>
                  <input
                    type="color"
                    value="#ef4444"
                    oninput="setPaintRumahSakit(this.value)"
                    class="w-full rounded-lg"
                  />
                </div>

                <!-- STYLING OPACITY -->
                <div class="w-full">
                  <label>Opacity</label>
                  <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.1"
                    value="1"
                    oninput="setPaintOpacityRumahSakit(parseFloat(this.value))"
                    class="w-full"
                  />
                </div>
              </div>
            </div>
          </section>

          <!-- 3. POLYGON STYLING - Administrasi -->
          <section>
            <h3
              class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4 italic"
            >
              3. Polygon Styling
            </h3>
            <div
              class="p-5 bg-slate-50 border border-slate-100 rounded-3xl space-y-4 shadow-sm"
            >
              <div class="flex flex-col items-center justify-between">
                <div class="flex flex-row w-full items-center justify-between gap-4">
                  <div class="flex flex-row items-center gap-2">
                    <div class="w-3 h-3 bg-indigo-500 rounded-sm"></div>
                    <span class="text-[11px] font-black text-indigo-900 uppercase">Batas Administrasi</span>
                  </div>
                  <button
                    id="toggle-poly-layer"
                    onclick="toggleLayerAdministrasi()"
                    class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-indigo-200 text-indigo-600 shadow-sm"
                  >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                  </button>
                </div>

                <!-- styling color -->
                <div class="flex w-full items-center justify-between gap-4 mt-3">
                  <label>Color</label>
                  <input
                    type="color"
                    value="#27B4F5"
                    oninput="setPaintAdministrasi(this.value)"
                    class="w-full rounded-lg"
                  />
                </div>

                <!-- opacity -->
                <div class="w-full mt-2">
                  <label>Opacity</label>
                  <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.1"
                    value="0.5"
                    oninput="setPaintOpacityAdministrasi(parseFloat(this.value))"
                    class="w-full"
                  />
                </div>
              </div>
            </div>
          </section>

          <!-- 4. LINE STYLING - Jalan -->
          <section>
            <h3
              class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4 italic"
            >
              4. Line Styling
            </h3>
            <div
              class="p-5 bg-slate-50 border border-slate-100 rounded-3xl space-y-4 shadow-sm"
            >
              <div class="flex flex-col items-center justify-between w-full">
                <div class="flex flex-row items-center gap-2 w-full justify-between">
                  <div class="flex items-center gap-2">
                    <div class="w-3 h-0.5 bg-amber-500 rounded-full"></div>
                    <span class="text-[11px] font-black text-blue-900 uppercase tracking-tight">Jalan</span>
                  </div>
                  <button
                    id="toggle-line-layer"
                    onclick="toggleLayerJalan()"
                    class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-blue-200 text-blue-600 shadow-sm"
                  >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                  </button>
                </div>

                <!-- styling color -->
                <div class="flex w-full items-center justify-between gap-4 mt-3">
                  <label>Color</label>
                  <input
                    type="color"
                    value="#F5A227"
                    oninput="setPaintJalan(this.value)"
                    class="w-full rounded-lg"
                  />
                </div>
              </div>
            </div>
          </section>

          <!-- 5. BUFFER TOOLS -->
          <section>
            <h3
              class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4 italic"
            >
              5. Buffer Tools
            </h3>
            <div class="flex flex-col gap-2 p-2">
              <div class="flex flex-col gap-2">
                <label>Radius Buffer (meter)</label>
                <input
                  type="number"
                  id="radius-buffer"
                  min="100"
                  max="5000"
                  step="100"
                  value="500"
                  class="w-full p-3 rounded-xl bg-white border border-slate-200 text-[11px] font-black text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                />
              </div>
              <button
                id="button-buffer"
                class="w-full py-4 bg-indigo-600 text-white rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all"
              >
                Jalankan Buffer
              </button>
              <button
                id="button-hapus-buffer"
                class="w-full py-3 bg-slate-200 text-slate-600 rounded-2xl text-[11px] font-black uppercase tracking-widest hover:bg-slate-300 transition-all"
              >
                Hapus Buffer
              </button>
            </div>
          </section>

          <!-- 6. ISOCHRONE TOOLS -->
          <section>
            <h3
              class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4 italic"
            >
              6. Isochrone Tools
            </h3>
            <div class="flex flex-col gap-2 p-2">
              <div class="flex flex-col gap-2">
                <label>Mode Transportasi</label>
                <select
                  id="transportasi"
                  class="w-full p-3 rounded-xl bg-white border border-slate-200 text-[11px] font-black text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                >
                  <option value="foot">Kaki</option>
                  <option value="motorcycle">Motor</option>
                </select>
              </div>
              <div class="flex flex-col gap-2">
                <label>Waktu (detik)</label>
                <input
                  type="number"
                  min="0"
                  max="3600"
                  value="300"
                  id="waktu"
                  class="w-full p-3 rounded-xl bg-white border border-slate-200 text-[11px] font-black text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                />
              </div>
              <button
                id="button-run"
                class="w-full py-4 bg-indigo-600 text-white rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center"
              >
                Jalankan Analisis
              </button>
              <div>
                <label>Hasil</label>
                <div class="w-full h-full overflow-y-auto">
                  <ul
                    id="hasil"
                    class="w-full p-3 rounded-xl bg-white border border-slate-200 text-[11px] font-black text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                  >
                    <li></li>
                  </ul>
                </div>
              </div>
            </div>
          </section>

        </div>
      </aside>

      <main class="flex-grow bg-slate-100 relative">
        <div id="map" class="w-full h-full"></div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
